<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Form</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="forms.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

    <form action="mailto:rodrigodfn$missionreadyhq.com" method="post" autocomplete="on">

        <legend><h1>Contact Us!</h1></legend><br><br>
        
        <fieldset>

            <!-- Name -->
            <label for="name">Name:</label>
            <input 
                type="text" 
                id="name" 
                name="name" 
                required 
                placeholder="first and last name"
            >
            <i class="bx bxs-user"></i>
            <br><br>

            <!-- Email -->
            <label for="email">Email:</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="your.email@example.com"
            >
            <i class="bx bxs-lock-alt"></i>
            <br><br>

            <!-- Password -->
            <label for="password">Password:</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="enter your password"
            >
            <i class="bx bxs-lock-alt"></i>
            <br><br>

            <!-- Login button -->
            <input type="submit" value="Login">
            <br><br>

            <!-- Remember me -->
            <input type="checkbox" id="remember-me" name="remember-me">
            <label for="remember-me">Remember me</label>
            <br><br>

            <a href="#">Forgot password?</a>
            <br><br>

            <!-- Subject (Radio buttons) -->
            <label><h2>Subject</h2></label>
            <br><br>
            
            <input type="radio" id="sales" name="subject" value="sales">
            <label for="sales">Sales</label>
            <br><br>
            
            <input type="radio" id="support" name="subject" value="support">
            <label for="support">Support</label>
            <br><br>

            <input type="radio" id="other" name="subject" value="other">
            <label for="other">Other</label>
            <br><br>

            <!-- Message -->
            <label for="message">Message Us...</label>
            <br><br>

            <textarea 
                id="message" 
                name="message" 
                rows="4" 
                cols="50" 
                placeholder="Type your message here..."
            ></textarea>
            <br><br>

            <!-- Submit -->
            <input type="submit" value="Submit">

        </fieldset>

    </form>

    <div>Samosa Chaat</div>

</body>
</html>
