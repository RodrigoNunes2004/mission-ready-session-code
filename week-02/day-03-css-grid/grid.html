<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>

        /*======= CSS RESETTING =======*/
        *{
            box-sizing: border-box;
        }

        body{
            margin: 0;
        } 

        .parent{ 
            height: 1000px;
            display: grid;
            border: 4px solid black;
            /*grid-template-columns: 1fr 1fr 1fr;*/
            grid-template-rows: 1fr 200px;
            grid-template-columns: 1fr 2fr;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            grid-template-rows: 1fr 200px;
           /* width: 100%;*/
        }

        .child1{
           background-color: blueviolet;
           height: 100px;
        }

        .child2{
            background-color: rgb(43, 226, 171);
            grid-column: 3/4;
        }

        .child3{
            background-color: rgb(233, 79, 139);
            grid-column: 2/3;
            grid-row: 1/2;

        }

        .child4{
            background-color: rgb(224, 232, 172);

        }

        .child5{
            background-color: rgb(43, 107, 226);
            grid-column: 2/4;
        }

        .child6{
            background-color: rgb(226, 141, 43);
        }


    </style>
</head>
<body>

    <div class="parent">
        <div class="child1">first box</div>
        <div class="child2">second box</div>
        <div class="child3">third box</div>
        <div class="child4">forth box</div>
        <div class="child5">fifth box</div>
       <!-- <div class="child6">sixth box</div>-->
    </div>
    
</body>
</html>
