<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Image Gallery</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Hello World</h1>

    <div class="gallery">

        <div class="gallery-item">
            <a target="_blank" href="assets/images/img_5terre.jpg">
                <img src="assets/images/img_5terre.jpg" alt="Cinque Terre" width="600" height="400">
            </a>
            <div class="desc">Cinque Terre</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="assets/images/img_forest.jpg">
                <img src="assets/images/img_forest.jpg" alt="Forest" width="600" height="400">
            </a>
            <div class="desc">Green Forest</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="assets/images/img_lights.jpg">
                <img src="assets/images/img_lights.jpg" alt="Northern Lights" width="600" height="400">
            </a>
            <div class="desc">Northern Lights</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="assets/images/img_mountains.jpg">
                <img src="assets/images/img_mountains.jpg" alt="Mountains" width="600" height="400">
            </a>
            <div class="desc">Mountains</div>
        </div>

    </div> <!-- closes .gallery -->

    <script src="" async defer></script>

</html>
